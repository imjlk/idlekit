name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Bunli Generate Check
        run: bun run --cwd packages/cli generate:check

      - name: Bunli Completion Doctor
        run: bun run --cwd packages/cli doctor:completions

      - name: Runtime Import Check
        run: bun run runtime:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Release Dry Run
        run: bun run release:dry-run

      - name: Perf Check (simulate benchmark)
        run: bun run bench:sim:check

      - name: Perf Check (simulate benchmark suite)
        run: bun run bench:sim:suite:check

      - name: Docs Verify (quick)
        run: bun run docs:verify:quick

      - name: Template Governance Check
        run: bun run templates:check

      - name: Install Smoke
        run: bun run install:smoke

      - name: README Smoke
        run: bun run readme:smoke

      - name: Compatibility Check
        run: bun run compat:check

      - name: Public Readiness Check
        run: bun run public:check

      - name: Replay Verify Gate
        run: bun run replay:verify

      - name: KPI AB Report
        run: bun run kpi:report

      - name: KPI Regression Gate
        run: bun run kpi:regress
