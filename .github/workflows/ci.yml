name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Release Dry Run
        run: bun run release:dry-run

      - name: Perf Check (simulate benchmark)
        run: bun run bench:sim:check

      - name: Perf Check (simulate benchmark suite)
        run: bun run bench:sim:suite:check

      - name: Docs Verify (quick)
        run: bun run docs:verify:quick

      - name: Replay Verify Gate
        run: bun run replay:verify

      - name: KPI AB Report
        run: bun run kpi:report

      - name: KPI Regression Gate
        run: bun run kpi:regress
