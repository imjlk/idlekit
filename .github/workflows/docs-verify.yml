name: Docs Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [quick, full]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify Docs (quick)
        if: matrix.mode == 'quick'
        run: bun run docs:verify:quick

      - name: Verify Docs (full)
        if: matrix.mode == 'full'
        run: bun run docs:verify
